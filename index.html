<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>足球 AI 預測</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3248;--accent:#4f8ef7;--accent2:#7c5af0;--green:#3ecf8e;--red:#f05252;--yellow:#f5a623;--text:#e8eaf0;--text2:#8b90a7;--text3:#555a72;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Noto Sans TC',sans-serif;font-size:14px;min-height:100vh}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(62,207,142,0.1);border:1px solid rgba(62,207,142,0.3);color:var(--green);font-size:11px;font-weight:600;padding:4px 12px;border-radius:100px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.main{max-width:1100px;margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:320px 1fr;gap:24px}
.sidebar{display:flex;flex-direction:column;gap:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;margin-top:12px}
label:first-of-type{margin-top:0}
select,input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
select:focus,input:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .1s;margin-top:16px}
.btn-primary:hover{opacity:.9}.btn-primary:active{transform:scale(.98)}.btn-primary:disabled{opacity:.4;cursor:default;transform:none}
.btn-analyze{width:100%;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--accent);border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-top:4px}
.btn-analyze:hover{background:rgba(79,142,247,.18)}.btn-analyze:disabled{opacity:.35;cursor:default}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;background:var(--surface2);padding:4px;border-radius:var(--radius-sm)}
.tab{padding:7px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text2);border:none;background:transparent;transition:all .15s;text-align:center}
.tab.active{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.content{display:flex;flex-direction:column;gap:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-label{font-size:13px;font-weight:600;color:var(--text2)}
.count-badge{font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:100px}
.matches-list{display:flex;flex-direction:column;gap:8px;max-height:460px;overflow-y:auto;padding-right:2px}
.matches-list::-webkit-scrollbar{width:4px}.matches-list::-webkit-scrollbar-track{background:transparent}.matches-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .15s,background .15s}
.match-card:hover{border-color:rgba(79,142,247,.4);background:var(--surface2)}
.match-card.selected{border-color:var(--accent);background:rgba(79,142,247,.05);box-shadow:0 0 0 1px var(--accent) inset}
.match-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.meta-tag{font-size:11px;color:var(--text3)}
.live-tag{font-size:10px;font-weight:700;background:rgba(240,82,82,.15);border:1px solid rgba(240,82,82,.3);color:#f07070;padding:2px 8px;border-radius:100px}
.match-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.team{display:flex;align-items:center;gap:10px}
.team-away{flex-direction:row-reverse;text-align:right}
.team-logo{width:28px;height:28px;object-fit:contain;border-radius:50%;background:var(--surface2);border:1px solid var(--border);padding:2px;flex-shrink:0}
.team-placeholder{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0}
.team-name{font-size:13px;font-weight:500;color:var(--text)}
.score-box{text-align:center;min-width:66px}
.score{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.vs{font-size:12px;color:var(--text3);font-weight:500}
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:12px}
.loading-state{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.status-ok{background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.25);color:var(--green);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:10px}
.status-warn{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);color:var(--yellow);font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-top:10px;line-height:1.5}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.result-card.hidden{display:none}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.result-title{font-size:15px;font-weight:600}
.result-sub{font-size:12px;color:var(--text2);margin-top:2px}
.winner-banner{background:linear-gradient(135deg,rgba(79,142,247,.08),rgba(124,90,240,.08));border:1px solid rgba(79,142,247,.2);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.winner-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.winner-name{font-size:20px;font-weight:700;color:var(--accent)}
.predicted-score{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.prob-title{font-size:12px;color:var(--text2);margin-bottom:12px;font-weight:600}
.prob-row{display:grid;grid-template-columns:120px 1fr 44px;align-items:center;gap:12px;margin-bottom:10px}
.prob-label{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prob-track{background:var(--surface2);border-radius:100px;height:8px;overflow:hidden}
.prob-fill{height:100%;border-radius:100px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.prob-fill.home{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.prob-fill.draw{background:var(--text3)}
.prob-fill.away{background:linear-gradient(90deg,var(--red),#f07070)}
.prob-pct{font-size:13px;font-weight:600;text-align:right}
.factors-title{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:600;margin-top:16px}
.factor-tags{display:flex;flex-wrap:wrap;gap:6px}
.factor-tag{font-size:12px;padding:4px 11px;border-radius:100px;font-weight:500}
.factor-tag.positive{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.3);color:#5de0a8}
.factor-tag.negative{background:rgba(240,82,82,.12);border:1px solid rgba(240,82,82,.3);color:#f07070}
.factor-tag.neutral{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);color:#7aabf7}
.ai-summary{font-size:13px;color:var(--text2);line-height:1.7;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}
.info-box{background:rgba(79,142,247,.06);border:1px solid rgba(79,142,247,.15);border-radius:var(--radius);padding:14px 16px;font-size:12px;color:var(--text2);line-height:1.7}
.data-section{margin-top:20px;padding-top:18px;border-top:1px solid var(--border)}
.data-section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.stat-compare{display:flex;flex-direction:column;gap:12px}
.stat-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.stat-bar-wrap{display:flex;align-items:center;gap:8px}
.stat-bar-wrap.left{flex-direction:row-reverse}
.stat-bar{height:7px;border-radius:100px;background:var(--surface2);flex:1;overflow:hidden;position:relative}
.stat-bar-fill{height:100%;border-radius:100px}
.stat-bar-fill.home{background:linear-gradient(90deg,var(--accent2),var(--accent))}
.stat-bar-fill.away{background:linear-gradient(90deg,var(--red),#f07070)}
.stat-val{font-size:14px;font-weight:700;min-width:34px;text-align:center}
.stat-val.left{text-align:right}.stat-val.right{text-align:left}
.stat-name{font-size:11px;color:var(--text3);text-align:center;min-width:78px;font-weight:600}
.form-pills{display:flex;gap:3px}
.form-pill{width:18px;height:18px;border-radius:4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff}
.form-pill.W{background:var(--green)}.form-pill.D{background:var(--text3)}.form-pill.L{background:var(--red)}
.h2h-list{display:flex;flex-direction:column;gap:6px}
.h2h-item{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px}
.h2h-team{color:var(--text2)}.h2h-team.r{text-align:right}
.h2h-score{font-size:14px;font-weight:700;min-width:54px;text-align:center;letter-spacing:.5px}
.h2h-date{font-size:10px;color:var(--text3);text-align:center;margin-top:2px}
.player-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.player-col-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.player-row:last-child{border-bottom:none}
.player-name{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-stat{font-size:11px;color:var(--text3);white-space:nowrap;display:flex;gap:8px;flex-shrink:0}
.player-wr{font-weight:700}.player-wr.hi{color:var(--green)}.player-wr.mid{color:var(--yellow)}.player-wr.lo{color:var(--red)}
.data-note{font-size:11px;color:var(--text3);font-style:italic;margin-top:8px}
.xg-row{display:flex;justify-content:center;gap:24px;margin-bottom:14px}
.xg-box{text-align:center}
.xg-label{font-size:11px;color:var(--text3);margin-bottom:2px}
.xg-val{font-size:20px;font-weight:700;color:var(--accent)}
.xg-val.away{color:#f07070}
.score-list{display:flex;flex-direction:column;gap:7px}
.score-row{display:grid;grid-template-columns:54px 1fr 46px;align-items:center;gap:10px}
.score-label{font-size:14px;font-weight:700;text-align:center;letter-spacing:.5px}
.score-label.fav{color:var(--accent)}
.score-track{background:var(--surface2);border-radius:100px;height:9px;overflow:hidden}
.score-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.score-pct{font-size:12px;font-weight:600;text-align:right;color:var(--text2)}
.intel-box{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:var(--radius-sm);padding:10px 12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6}
.intel-label{display:block;font-size:11px;font-weight:700;color:var(--yellow);margin-bottom:4px;letter-spacing:.05em}
.adj-toggles{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.adj-toggle{font-size:11px;color:var(--text2);display:flex;align-items:flex-start;gap:7px;line-height:1.5;cursor:pointer;margin:0}
.adj-toggle input{width:auto;margin-top:1px;flex-shrink:0;cursor:pointer}
.adj-badge{display:inline-block;font-size:10px;font-weight:600;background:rgba(124,90,240,.14);border:1px solid rgba(124,90,240,.3);color:#a99af5;padding:3px 9px;border-radius:100px;margin-right:6px}
.adj-badge.off{background:var(--surface2);border-color:var(--border);color:var(--text3)}
.script-box{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;border:1px solid var(--border)}
.script-box.main{background:rgba(79,142,247,.07);border-color:rgba(79,142,247,.3)}
.script-box.hedge{background:rgba(245,166,35,.06);border-color:rgba(245,166,35,.25)}
.script-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.script-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:100px;white-space:nowrap;flex-shrink:0}
.script-tag.main{background:rgba(79,142,247,.18);color:#7aabf7}
.script-tag.hedge{background:rgba(245,166,35,.18);color:var(--yellow)}
.script-sub{font-size:10px;color:var(--text3);white-space:nowrap}
.script-score{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:5px}
.script-score .sc-num{font-size:24px;font-weight:700;letter-spacing:2px;line-height:1.1}
.script-prob{font-size:13px;font-weight:600;color:var(--text2)}
.script-desc{font-size:12px;color:var(--text2);line-height:1.6}
/* 智能配注儀表板 */
.stake-panel{background:linear-gradient(135deg,rgba(124,90,240,.10),rgba(236,72,153,.06));border:1px solid rgba(124,90,240,.28);border-radius:var(--radius);padding:16px;backdrop-filter:blur(8px);box-shadow:0 0 0 1px rgba(124,90,240,.06),inset 0 0 24px rgba(124,90,240,.05)}
.stake-budget-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.stake-budget-label{font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0}
.stake-input-wrap{position:relative;flex:1;display:flex;align-items:center}
.stake-dollar{position:absolute;left:12px;font-size:15px;font-weight:700;color:#c4a8ff;pointer-events:none}
.stake-input-wrap input{width:100%;padding:10px 12px 10px 26px;background:rgba(10,12,24,.5);border:1px solid rgba(124,90,240,.35);border-radius:var(--radius-sm);color:var(--text);font-size:16px;font-weight:700;letter-spacing:.5px}
.stake-input-wrap input:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 3px rgba(124,90,240,.18)}
.stake-toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stake-toggle{display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;border-radius:var(--radius-sm);border:1px solid var(--border);background:rgba(255,255,255,.02);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.stake-toggle-sub{font-size:10px;opacity:.7;font-weight:500;letter-spacing:1px}
.stake-toggle:hover{border-color:rgba(124,90,240,.4)}
.stake-toggle.active{background:linear-gradient(135deg,rgba(124,90,240,.25),rgba(236,72,153,.18));border-color:#a78bfa;color:#fff;box-shadow:0 0 14px rgba(124,90,240,.3)}
.stake-alloc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.stake-alloc-box{border-radius:var(--radius-sm);padding:11px 12px;border:1px solid var(--border)}
.stake-alloc-box.market{background:rgba(79,142,247,.08);border-color:rgba(79,142,247,.28)}
.stake-alloc-box.attack{background:rgba(236,72,153,.07);border-color:rgba(236,72,153,.28)}
.stake-alloc-head{display:flex;align-items:baseline;justify-content:space-between;gap:6px;flex-wrap:wrap}
.stake-alloc-name{font-size:12px;font-weight:600;color:var(--text2)}
.stake-alloc-amt{font-size:18px;font-weight:800;color:#fff;letter-spacing:.3px}
.stake-alloc-detail{font-size:10.5px;color:var(--text3);margin-top:5px;line-height:1.5}
.stake-note{font-size:11px;color:var(--text3);line-height:1.6}
.stake-note #stake-ratio{color:#c4a8ff;font-weight:700}
.stake-tag{font-size:10.5px;font-weight:700;color:#34d399;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);padding:2px 8px;border-radius:100px;white-space:nowrap;flex-shrink:0}
/* 狀態燈號（呼吸燈） */
.status-light{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;backdrop-filter:blur(10px);border:1px solid var(--border);flex-wrap:wrap}
.status-light .sl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.status-light .sl-text{font-size:13px;font-weight:700}
.status-light .sl-sub{font-size:11px;opacity:.7;margin-left:auto}
.status-light.hist{background:rgba(148,163,184,.08);border-color:rgba(148,163,184,.25)}
.status-light.hist .sl-dot{background:#94a3b8;animation:slow-blink 2.2s ease-in-out infinite}
.status-light.hist .sl-text{color:#cbd5e1}
.status-light.live{background:linear-gradient(135deg,rgba(52,211,153,.14),rgba(124,90,240,.14));border-color:rgba(52,211,153,.45);box-shadow:0 0 18px rgba(52,211,153,.25)}
.status-light.live .sl-dot{background:#34d399;box-shadow:0 0 8px #34d399;animation:breathe 1.3s ease-in-out infinite}
.status-light.live .sl-text{color:#6ee7b7}
@keyframes slow-blink{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes breathe{0%,100%{opacity:.5;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
/* 大結論 */
.verdict{background:linear-gradient(135deg,rgba(124,90,240,.12),rgba(236,72,153,.07));border:1px solid rgba(124,90,240,.3);border-radius:var(--radius);padding:18px 16px;margin-bottom:12px}
.verdict-grid{display:flex;align-items:center;justify-content:center;gap:14px}
.verdict-col{text-align:center;flex:1}
.verdict-sep{width:1px;align-self:stretch;background:rgba(255,255,255,.12)}
.verdict-label{font-size:11px;color:var(--text3);margin-bottom:4px;letter-spacing:.05em}
.verdict-winner{font-size:26px;font-weight:800;color:#fff;line-height:1.1;word-break:break-word}
.verdict-score{font-size:30px;font-weight:800;color:#c4a8ff;letter-spacing:2px;line-height:1.1}
.verdict-ou{text-align:center;margin-top:12px;font-size:13px;color:var(--text2)}
.verdict-ou b{color:#fff}
.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.adj-badge.live{background:rgba(52,211,153,.16);border-color:rgba(52,211,153,.4);color:#6ee7b7}
/* 臨場校正面板 */
.live-panel{display:flex;flex-direction:column;gap:10px}
.live-row{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.02);cursor:pointer;font-size:13px;color:var(--text)}
.live-row:has(input:checked){border-color:rgba(52,211,153,.45);background:rgba(52,211,153,.07)}
.live-row input{width:20px;height:20px;margin-top:1px;flex-shrink:0;cursor:pointer;accent-color:#34d399}
.live-hint{font-size:11px;color:var(--text3);font-weight:400}
/* 手風琴 */
.acc-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.acc-body.open{max-height:600px}
.acc-btn{width:100%;margin-top:8px;padding:8px;background:rgba(124,90,240,.1);border:1px solid rgba(124,90,240,.28);border-radius:var(--radius-sm);color:#c4a8ff;font-size:12px;font-weight:600;cursor:pointer}
.acc-btn:hover{background:rgba(124,90,240,.18)}

<body>

<main class="main">
  <aside class="sidebar">

</main>
<script>
const STATUS_MAP={NS:'upcoming',TBD:'upcoming',PST:'upcoming','1H':'live','2H':'live',HT:'live',ET:'live',P:'live',LIVE:'live',BT:'live',FT:'finished',AET:'finished',PEN:'finished',AWD:'finished',WO:'finished',SUSP:'finished',INT:'finished',ABD:'finished',CANC:'finished'};
// 球隊名稱中譯（涵蓋世界盃與主要國家隊；對照不到則保留原文）
const TEAM_TW={
'France':'法國','Spain':'西班牙','England':'英格蘭','Germany':'德國','Brazil':'巴西','Argentina':'阿根廷','Portugal':'葡萄牙','Netherlands':'荷蘭','Italy':'義大利','Belgium':'比利時','Croatia':'克羅埃西亞','Mexico':'墨西哥','USA':'美國','United States':'美國','Canada':'加拿大','Uruguay':'烏拉圭','Colombia':'哥倫比亞','Japan':'日本','South Korea':'南韓','Korea Republic':'南韓','South-Korea':'南韓','Australia':'澳洲','Morocco':'摩洛哥','Senegal':'塞內加爾','Ghana':'迦納','Nigeria':'奈及利亞','Cameroon':'喀麥隆','Egypt':'埃及','Tunisia':'突尼西亞','Algeria':'阿爾及利亞','Ivory Coast':'象牙海岸','Cote d\'Ivoire':'象牙海岸','Saudi Arabia':'沙烏地阿拉伯','Iran':'伊朗','Qatar':'卡達','Switzerland':'瑞士','Denmark':'丹麥','Sweden':'瑞典','Poland':'波蘭','Serbia':'塞爾維亞','Austria':'奧地利','Ukraine':'烏克蘭','Wales':'威爾斯','Scotland':'蘇格蘭','Norway':'挪威','Turkey':'土耳其','Türkiye':'土耳其','Greece':'希臘','Czech Republic':'捷克','Czechia':'捷克','Romania':'羅馬尼亞','Hungary':'匈牙利','Ecuador':'厄瓜多','Peru':'秘魯','Chile':'智利','Paraguay':'巴拉圭','Venezuela':'委內瑞拉','Bolivia':'玻利維亞','Costa Rica':'哥斯大黎加','Panama':'巴拿馬','Jamaica':'牙買加','Honduras':'宏都拉斯','Jordan':'約旦','Iraq':'伊拉克','Uzbekistan':'烏茲別克','New Zealand':'紐西蘭','Curacao':'庫拉索','Curaçao':'庫拉索','Cape Verde':'維德角','South Africa':'南非','DR Congo':'剛果民主共和國','Congo DR':'剛果民主共和國','Congo-DR':'剛果民主共和國','Slovenia':'斯洛維尼亞','Slovakia':'斯洛伐克','Finland':'芬蘭','Ireland':'愛爾蘭','Iceland':'冰島','Russia':'俄羅斯','Israel':'以色列','Mali':'馬利','Burkina Faso':'布吉納法索','Angola':'安哥拉','Zambia':'尚比亞','Gabon':'加彭','Guinea':'幾內亞','Montenegro':'蒙特內哥羅','Albania':'阿爾巴尼亞','Georgia':'喬治亞','Bosnia and Herzegovina':'波士尼亞','North Macedonia':'北馬其頓','Haiti':'海地','El Salvador':'薩爾瓦多','Guatemala':'瓜地馬拉','Trinidad and Tobago':'千里達','China':'中國','China PR':'中國','Thailand':'泰國','Vietnam':'越南','Indonesia':'印尼','Oman':'阿曼','Bahrain':'巴林','UAE':'阿聯','United Arab Emirates':'阿聯','Kuwait':'科威特','Palestine':'巴勒斯坦','Lebanon':'黎巴嫩','Syria':'敘利亞','India':'印度'
};
function tw(n){return (n&&TEAM_TW[n])||n||'';}
let currentTab='upcoming',allMatches=[],filteredMatches=[],selectedIdx=null;

function switchTab(t){currentTab=t;selectedIdx=null;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['upcoming','live','finished'][i]===t));document.getElementById('analyze-btn').disabled=true;document.getElementById('result-card').classList.add('hidden');renderMatches()}

async function fetchMatches(){
  const apiKey=document.getElementById('api-key').value.trim();
  if(!apiKey){showStatus('warn','請先填入 API Key');return}
  const val=document.getElementById('league-select').value;
  const[leagueId,season]=val.split('|');
  const leagueName=document.getElementById('league-select').selectedOptions[0].text;
  const[past,future]=document.getElementById('date-range').value.split('|').map(Number);
  const btn=document.getElementById('fetch-btn');
  btn.disabled=true;btn.textContent='載入中...';
  showStatus('info','連線中...');
  const today=new Date();
  const from=new Date(today);from.setDate(from.getDate()-past);
  const to=new Date(today);to.setDate(to.getDate()+future);
  const fmt=d=>d.toISOString().split('T')[0];
  try{
    const res=await fetch(`/api/football/fixtures?league=${leagueId}&season=${season}&from=${fmt(from)}&to=${fmt(to)}`,{headers:{'x-apisports-key':apiKey}});
    const data=await res.json();
    if(data.errors&&Object.keys(data.errors).length>0)throw new Error(Object.values(data.errors).join(', '));
    allMatches=(data.response||[]).map(f=>({id:f.fixture.id,status:STATUS_MAP[f.fixture.status.short]||'finished',statusShort:f.fixture.status.short,elapsed:f.fixture.status.elapsed,date:f.fixture.date,league:leagueName,leagueId,season,home:f.teams.home.name,homeId:f.teams.home.id,homeLogo:f.teams.home.logo,away:f.teams.away.name,awayId:f.teams.away.id,awayLogo:f.teams.away.logo,homeGoals:f.goals.home,awayGoals:f.goals.away,venue:f.fixture.venue?.name||''}));
    showStatus('ok',`✓ 取得 ${allMatches.length} 場 ${leagueName} 真實賽事`);
    renderMatches();
  }catch(e){showStatus('warn','API 錯誤：'+e.message)}
  btn.disabled=false;btn.textContent='↻ 載入真實賽事';
}

function renderMatches(){
  filteredMatches=allMatches.filter(m=>m.status===currentTab);
  const label=currentTab==='upcoming'?'即將開賽':currentTab==='live'?'進行中':'已結束';
  document.getElementById('matches-label').textContent=label;
  document.getElementById('count-badge').textContent=filteredMatches.length?`${filteredMatches.length} 場`:'';
  if(!filteredMatches.length){document.getElementById('matches-list').innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><div>沒有「${label}」場次</div></div>`;return}
  document.getElementById('matches-list').innerHTML=filteredMatches.map((m,i)=>{
    const dt=new Date(m.date);
    const ts=dt.toLocaleString('zh-TW',{month:'numeric',day:'numeric',weekday:'short',hour:'2-digit',minute:'2-digit'});
    const sc=(m.homeGoals!==null&&m.awayGoals!==null)?`${m.homeGoals} - ${m.awayGoals}`:null;
    const lh=m.homeLogo?`<img class="team-logo" src="${m.homeLogo}" alt="" onerror="this.outerHTML='<div class=team-placeholder>${m.home.substring(0,2).toUpperCase()}</div>'">`:`<div class="team-placeholder">${m.home.substring(0,2).toUpperCase()}</div>`;
    const la=m.awayLogo?`<img class="team-logo" src="${m.awayLogo}" alt="" onerror="this.outerHTML='<div class=team-placeholder>${m.away.substring(0,2).toUpperCase()}</div>'">`:`<div class="team-placeholder">${m.away.substring(0,2).toUpperCase()}</div>`;
    return`<div class="match-card" id="mc${i}" onclick="selectMatch(${i})"><div class="match-meta"><span class="meta-tag">🕐 ${ts}</span>${m.venue?`<span class="meta-tag">📍 ${m.venue}</span>`:''} ${m.status==='live'?`<span class="live-tag">● 直播中${m.elapsed?" "+m.elapsed+"'":""}</span>`:''}</div><div class="match-teams"><div class="team">${lh}<span class="team-name">${tw(m.home)}</span></div><div class="score-box">${sc?`<div class="score">${sc}</div>`:`<div class="vs">對</div>`}</div><div class="team team-away"><span class="team-name">${tw(m.away)}</span>${la}</div></div></div>`;
  }).join('');
}

function selectMatch(i){selectedIdx=i;document.querySelectorAll('.match-card').forEach((c,j)=>c.classList.toggle('selected',j===i));document.getElementById('analyze-btn').disabled=false;document.getElementById('result-card').classList.add('hidden')}

// ── API helper（透過後端代理，可帶快取）──
const apiCache={};
async function apiGet(path){
  if(apiCache[path])return apiCache[path];
  const res=await fetch('/api/football'+path,{headers:{'x-apisports-key':document.getElementById('api-key').value.trim()}});
  const data=await res.json();
  if(data.errors&&Object.keys(data.errors).length>0)throw new Error(Object.values(data.errors).join(', '));
  const out=data.response||[];
  apiCache[path]=out;
  return out;
}

const FINISHED=['FT','AET','PEN'];

// ── Poisson 波膽模型（含大賽修正）──
function factorial(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function poissonP(k,lambda){return Math.pow(lambda,k)*Math.exp(-lambda)/factorial(k);}

// 修正係數（可自行微調）
const ADJ={
  openerFav:0.80,   // 大賽首戰：強隊進球期望下調（領先後養生）
  openerDog:0.88,   // 大賽首戰：弱隊也略降（節奏放慢）
  eliteSuppress:0.45, // 含金量過濾：弱隊面對頂級強權的壓制係數(0.3~0.5)
  chaosFavBoost:1.30  // B劇本：對攻拉開時強隊進球上修
};
// B劇本：弱隊在對攻中也獲得機會的上修係數
const CHAOS_DOG_BOOST=1.25;
// 頂級傳控/高強中場球隊（弱隊面對它們時觸發含金量壓制）
const ELITE=['France','Spain','England','Brazil','Argentina','Germany','Portugal','Netherlands','Italy','Belgium'];

// 由場均進失球推算原始預期進球
function rawLambdas(hs,as){
  const leagueAvg=((hs.avgGf+as.avgGf+hs.avgGa+as.avgGa)/4)||1;
  let hL=hs.avgGf*as.avgGa/leagueAvg;
  let aL=as.avgGf*hs.avgGa/leagueAvg;
  hL*=1.05; aL*=0.97;
  return{hL:Math.max(0.2,hL||0.2),aL:Math.max(0.2,aL||0.2)};
}

// 給定兩隊 λ，算出完整比分機率網格
function poissonGrid(hL,aL){
  hL=Math.min(5,Math.max(0.12,hL)); aL=Math.min(5,Math.max(0.12,aL));
  const MAX=8;let homeWin=0,draw=0,awayWin=0,btts=0,over25=0;const scores=[];
  for(let i=0;i<=MAX;i++)for(let j=0;j<=MAX;j++){
    const p=poissonP(i,hL)*poissonP(j,aL);
    if(i>j)homeWin+=p;else if(i===j)draw+=p;else awayWin+=p;
    if(i>0&&j>0)btts+=p;
    if(i+j>=3)over25+=p;
    scores.push({h:i,a:j,p});
  }
  const tot=(homeWin+draw+awayWin)||1;
  homeWin/=tot;draw/=tot;awayWin/=tot;btts/=tot;over25/=tot;
  scores.forEach(s=>s.p/=tot);scores.sort((a,b)=>b.p-a.p);
  return{hL,aL,homeWin,draw,awayWin,btts,over25,top:scores.slice(0,8),mode:scores[0]};
}

// 主函式：套用三大修正，輸出控制流 + 暴走流雙劇本
function buildPrediction(m,hs,as,opts){
  const raw=rawLambdas(hs,as);
  const homeFav=raw.hL>=raw.aL;
  const favName=homeFav?m.home:m.away, dogName=homeFav?m.away:m.home;
  const favElite=ELITE.includes(favName);
  const useDilution=opts.dilution&&favElite;   // 弱隊面對 elite 才壓制
  const useOpener=opts.opener;

  // 【A 劇本：大賽控制流】套用含金量壓制 + 大賽首戰下調
  let hC=raw.hL, aC=raw.aL;
  if(useDilution){ if(homeFav) aC*=ADJ.eliteSuppress; else hC*=ADJ.eliteSuppress; }
  if(useOpener){
    if(homeFav){hC*=ADJ.openerFav; aC*=ADJ.openerDog;}
    else{aC*=ADJ.openerFav; hC*=ADJ.openerDog;}
  }

  // ── 臨場衝擊權重層（半自動，賽前手動勾選）──
  const live=opts.live||{};
  const liveActive=!!(live.starXI||live.oddsOver||live.groupR1);
  if(live.starXI){ if(homeFav)hC*=1.25; else aC*=1.25; }   // 強隊擺全主力 → 火力釋放
  if(live.oddsOver){ hC*=1.15; aC*=1.15; }                 // 盤口資金湧入大球 → 整體上修、控制流降權
  if(live.groupR1){ if(homeFav)hC*=1.18; else aC*=1.18; }  // 小組賽R1刷淨勝球 → 降低1-0養生

  const control=poissonGrid(hC,aC);

  // 【B 劇本：防翻車暴走流】強隊大幅上修、弱隊也獲得對攻機會（防線拉開）
  let hB=raw.hL, aB=raw.aL;
  if(homeFav){hB*=ADJ.chaosFavBoost; aB*=CHAOS_DOG_BOOST;} else {aB*=ADJ.chaosFavBoost; hB*=CHAOS_DOG_BOOST;}
  const chaos=poissonGrid(hB,aB);

  // A劇本主推：控制流中最可能的「低比分」(總分≤2)
  const scenA=control.top.find(s=>(s.h+s.a)<=2)||control.top[0];
  // B劇本防冷：暴走流中最可能的「大比分」(總分≥3)
  const scenB=chaos.top.find(s=>(s.h+s.a)>=3)||chaos.top[0];

  return{control,chaos,scenA,scenB,favName,dogName,homeFav,useDilution,useOpener,favElite,
    live,liveActive,
    overUnder:control.over25>=0.5?'over':'under'};
}

// ── 從近期比賽算進攻/防守數據 ──
function computeTeamStats(fixtures,teamId){
  let n=0,gf=0,ga=0,w=0,d=0,l=0,cs=0;const form=[];
  for(const f of fixtures){
    if(!FINISHED.includes(f.fixture.status.short))continue;
    const home=f.teams.home.id===teamId;
    const my=home?f.goals.home:f.goals.away, op=home?f.goals.away:f.goals.home;
    if(my==null||op==null)continue;
    n++;gf+=my;ga+=op;
    if(op===0)cs++;
    const r=my>op?'W':my===op?'D':'L';if(r==='W')w++;else if(r==='D')d++;else l++;
    form.push(r);
  }
  return{n,w,d,l,cs,avgGf:n?gf/n:0,avgGa:n?ga/n:0,csRate:n?cs/n:0,form:form.slice(0,5)};
}

// ── 隊員出場 × 勝負關聯（從含 lineup 的詳細比賽算）──
function computePlayerPatterns(fixtures,teamId){
  const map={};let withLineup=0;
  for(const f of fixtures){
    if(!FINISHED.includes(f.fixture.status.short))continue;
    const lu=(f.lineups||[]).find(x=>x.team&&x.team.id===teamId);
    if(!lu||!lu.startXI||!lu.startXI.length)continue;
    withLineup++;
    const home=f.teams.home.id===teamId;
    const my=home?f.goals.home:f.goals.away, op=home?f.goals.away:f.goals.home;
    if(my==null||op==null)continue;
    const res=my>op?'w':my===op?'d':'l';
    for(const it of lu.startXI){
      const p=it.player;if(!p)continue;const k=p.id;
      if(!map[k])map[k]={name:p.name,apps:0,w:0,d:0,l:0,gf:0,ga:0};
      const e=map[k];e.apps++;e[res]++;e.gf+=my;e.ga+=op;
    }
  }
  const players=Object.values(map).filter(p=>p.apps>=2)
    .map(p=>({...p,winRate:p.w/p.apps,avgGf:p.gf/p.apps,avgGa:p.ga/p.apps}))
    .sort((a,b)=>b.apps-a.apps||b.winRate-a.winRate).slice(0,8);
  return{players,withLineup};
}

            <div class="stake-alloc-head"><span class="stake-alloc-name">⚔️ 波膽進攻</span><span class="stake-alloc-amt" id="stake-score-total">$0</span></div>
            <div class="stake-alloc-detail" id="stake-score-detail"></div>
          </div>
        </div>
        <div class="stake-note">資金比例 <span id="stake-ratio">70:30</span>　•　配注金額隨本金與策略即時連動，下方波膽前三名會標出建議下注金額</div>
      </div>
    </div>`;
}

// 組裝完整預測區（含可重算容器 pv-head / pv-scores 與穩定面板）
function renderPrediction(m,pred,mWinner){

    <div id="status-light" class="status-light hist"><span class="sl-dot"></span><span class="sl-text">歷史數據模擬中</span><span class="sl-sub">尚未套用臨場校正</span></div>
    <div id="pv-head">${pvHead(m,pred,mWinner)}</div>
    ${livePanelHTML()}

}

// 手風琴展開/收合
function toggleAcc(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  const open=el.classList.toggle('open');

// 臨場校正切換 → 只重算模型，不重抓資料、不重呼叫 AI
let predCtx=null;
function recomputePred(){
  if(!predCtx)return;
  const {m,hs,as,opts}=predCtx;
  const chk=id=>{const e=document.getElementById(id);return !!(e&&e.checked);};
  opts.live={starXI:chk('live-star'),oddsOver:chk('live-odds'),groupR1:chk('live-group')};
  const pred=buildPrediction(m,hs,as,opts);
  predCtx.pred=pred;
  const c=pred.control;
  const mWinner=(c.homeWin>=c.draw&&c.homeWin>=c.awayWin)?m.home:(c.awayWin>=c.draw?m.away:'平局');
  const head=document.getElementById('pv-head'); if(head)head.innerHTML=pvHead(m,pred,mWinner);
  const sc=document.getElementById('pv-scores'); if(sc)sc.innerHTML=pvScores(m,pred);
  stakeData={overProb:c.over25,recommend:pred.overUnder,top3:c.top.slice(0,3).map(s=>({score:`${s.h}-${s.a}`,prob:s.p}))};
  setStatusLight(pred.liveActive);
  updateStake();
}

// ── The Odds API 盤口比對 ──
let oddsCache={data:null,at:0};
async function oddsGet(path){
  const res=await fetch('/api/odds'+path);
  let data;
  try{ data=await res.json(); }
  catch(_){ throw new Error('The Odds API 回傳非 JSON（HTTP '+res.status+'）'); }
  console.log('[TheOddsAPI]',path,'→ HTTP',res.status,data);
  if(!res.ok){
    const msg=(data&&data.message)||JSON.stringify(data).slice(0,200);
    throw new Error('The Odds API HTTP '+res.status+'：'+msg);
  }
  return data;
}
function normName(s){return (s||'').toLowerCase().replace(/[^a-z]/g,'');}

// 從 The Odds API 抽出大小分 2.5 Over/Under 賠率
function extractOU25(game){
  try{
    for(const bk of (game.bookmakers||[])){
      if(!/pinnacle/i.test(bk.key||bk.title||''))continue;
      for(const mkt of (bk.markets||[])){
        if(mkt.key!=='totals')continue;
        let over=null,under=null;
        for(const o of (mkt.outcomes||[])){
          if(Math.abs((o.point||0)-2.5)>0.01)continue;
          if(/over/i.test(o.name))over=o.price;
          if(/under/i.test(o.name))under=o.price;
        }
        if(over&&under)return{over,under,hcap:2.5};
      }
    }
    // fallback: 任何莊家
    for(const bk of (game.bookmakers||[])){
      for(const mkt of (bk.markets||[])){
        if(mkt.key!=='totals')continue;
        let over=null,under=null;
        for(const o of (mkt.outcomes||[])){
          if(Math.abs((o.point||0)-2.5)>0.01)continue;
          if(/over/i.test(o.name))over=o.price;
          if(/under/i.test(o.name))under=o.price;
        }
        if(over&&under)return{over,under,hcap:2.5};
      }
    }
  }catch(e){}
  return null;
}

async function fetchOddsCompare(){
  if(!predCtx)return;
  const m=predCtx.m, modelOver=predCtx.pred.control.over25;
  const el=document.getElementById('odds-status');
  const set=(t,cls)=>{if(el){el.className='odds-status '+(cls||'');el.innerHTML=t;}};
  set('🎲 連線 The Odds API、比對 Pinnacle 盤口中…','load');
  try{
    // The Odds API：soccer_fifa_world_cup 是世界盃的 sport key
    // regions=eu 取歐洲盤（含 Pinnacle），markets=totals 只取大小分
    if(!oddsCache.data||Date.now()-oddsCache.at>300000){
      oddsCache.data=await oddsGet('/sports/soccer_fifa_world_cup/odds?regions=eu&markets=h2h,totals&bookmakers=pinnacle');
      oddsCache.at=Date.now();
      console.log('[TheOddsAPI] 取得場次數：',oddsCache.data.length);
    }
    const games=oddsCache.data||[];
    const h=normName(m.home), a=normName(m.away);
    const tSel=new Date(m.date).getTime();
    let best=null,bestDt=1/0;
    for(const g of games){
      const ht=normName(g.home_team), at2=normName(g.away_team);
      const match=(ht.includes(h)||h.includes(ht))&&(at2.includes(a)||a.includes(at2));
      const matchRev=(ht.includes(a)||a.includes(ht))&&(at2.includes(h)||h.includes(at2));
      if(!match&&!matchRev)continue;
      const dt=Math.abs(new Date(g.commence_time).getTime()-tSel);
      if(dt<bestDt){bestDt=dt;best=g;}
    }
    if(!best){
      set('🎲 找不到對應世界盃場次（The Odds API 可能尚未開市，或隊名對不上）','warn');
      console.log('[TheOddsAPI] 現有場次：',games.map(g=>g.home_team+' vs '+g.away_team));
      return;
    }
    console.log('[TheOddsAPI 原始賠率物件]',best);
    const ou=extractOU25(best);
    if(!ou){
      set('🎲 已連到盤口，但 Pinnacle 尚未開出大小分 2.5 盤口（可能開賽前才出）','warn');
      return;
    }
    // 美式賠率轉換成隱含機率
    const toProb=p=>p>0?(100/(p+100)):((-p)/((-p)+100));
    const overProb=toProb(ou.over), underProb=toProb(ou.under);
    const impliedOver=overProb/(overProb+underProb); // 去除莊家抽水
    const diff=impliedOver-modelOver;
    const mk=Math.round(impliedOver*100), mm=Math.round(modelOver*100);
    if(diff>=0.10){
      const box=document.getElementById('live-odds');
      if(box&&!box.checked){box.checked=true;recomputePred();}
      set(`🎲 Pinnacle 大分隱含 ${mk}% ＞ 模型 ${mm}%（+${Math.round(diff*100)}%）→ 已自動勾選「盤口湧入大球」`,'hit');
    }else if(diff<=-0.10){
      set(`🎲 Pinnacle 大分隱含 ${mk}% ＜ 模型 ${mm}%：市場偏小分，維持控制流`,'ok');
    }else{
      set(`🎲 Pinnacle 大分隱含 ${mk}% vs 模型 ${mm}%：差距不足 ±10%，未觸發修正`,'ok');
    }
  }catch(e){set('🎲 盤口比對失敗：'+(e&&e.message?e.message:String(e))+'（請確認 Railway 已設定 THEODDS_KEY 環境變數）','warn');}
}

// ── 智能配注：狀態與演算法 ──
let stakeData=null, stakeRisk='conservative';

function calculateSmartStake(totalBudget, riskLevel, poissonData){
  const budget=Math.max(0,Math.round(Number(totalBudget)||0));
  const isCons=riskLevel==='conservative';
  const marketRatio=isCons?0.70:0.50, scoreRatio=1-marketRatio;
  const over=Math.min(0.99,Math.max(0.01,Number(poissonData.overProb)||0.5));
  const recIsOver=poissonData.recommend==='over';
  const mainConf=recIsOver?over:(1-over);
  const mainW=mainConf, hedgeW=1-mainConf;
  const mainSide=recIsOver?'大分':'小分', hedgeSide=recIsOver?'小分':'大分';
  const top3=(poissonData.top3||[]).slice(0,3);
  const top3Sum=top3.reduce((s,x)=>s+(Number(x.prob)||0),0)||1;
  const marketPool=budget*marketRatio, scorePool=budget*scoreRatio;
  const items=[
    {key:'market_main',ideal:marketPool*mainW},
    {key:'market_hedge',ideal:marketPool*hedgeW},
    ...top3.map((s,i)=>({key:'score_'+i,ideal:scorePool*((Number(s.prob)||0)/top3Sum)}))
  ];
  // 最大餘數法：確保整數加總 === 本金
  const fl=items.map(it=>({...it,base:Math.floor(it.ideal),rem:it.ideal-Math.floor(it.ideal)}));
  let rem=budget-fl.reduce((s,it)=>s+it.base,0);
  const ord=[...fl].sort((a,b)=>b.rem-a.rem);
  for(let i=0;i<rem;i++)ord[i%ord.length].base+=1;
  const fm={}; fl.forEach(it=>fm[it.key]=it.base);
  const breakdown=top3.map((s,i)=>({score:s.score,prob:s.prob,stake:fm['score_'+i]||0}));
  return{
    totalBudget:budget,
    ratio:{market:Math.round(marketRatio*100),score:Math.round(scoreRatio*100)},
    market:{total:(fm.market_main||0)+(fm.market_hedge||0),
      main:{side:mainSide,stake:fm.market_main||0,weight:Math.round(mainW*100)},
      hedge:{side:hedgeSide,stake:fm.market_hedge||0,weight:Math.round(hedgeW*100)}},
    scores:{total:breakdown.reduce((s,x)=>s+x.stake,0),breakdown}
  };
}

function setStakeRisk(r){
  stakeRisk=r;
  const c=document.getElementById('stake-cons'), a=document.getElementById('stake-agg');
  if(c&&a){c.classList.toggle('active',r==='conservative');a.classList.toggle('active',r==='aggressive');}
  updateStake();
}

function updateStake(){
  if(!stakeData)return;
  const inp=document.getElementById('stake-budget'); if(!inp)return;
  let b=parseInt(inp.value,10); if(isNaN(b)||b<0)b=0;
  const r=calculateSmartStake(b,stakeRisk,stakeData);
  const $=n=>'$'+n.toLocaleString();
  const set=(id,t)=>{const el=document.getElementById(id);if(el)el.textContent=t;};
  set('stake-market-total',$(r.market.total));
  set('stake-market-detail',`主推${r.market.main.side} ${$(r.market.main.stake)}（${r.market.main.weight}%）· 對沖${r.market.hedge.side} ${$(r.market.hedge.stake)}`);
  set('stake-score-total',$(r.scores.total));
  set('stake-score-detail',r.scores.breakdown.map(x=>`${x.score} ${$(x.stake)}`).join('　·　'));
  set('stake-ratio',`${r.ratio.market}:${r.ratio.score}`);
  r.scores.breakdown.forEach((x,i)=>set('stake-tag-'+i,'建議下注 '+$(x.stake)));
}

// ── 畫出真實數據區塊：攻守對比 + 歷史比分 + 關鍵球員 ──
function renderDataSections(m,hs,as,hp,ap,h2hFin){
  const bar=(hv,av)=>{const t=hv+av||1;return[Math.round(hv/t*100),Math.round(av/t*100)]};
  const statRow=(name,hv,av,fmt)=>{
    const[hpct,apct]=bar(hv,av);
    return`<div class="stat-row">
      <div class="stat-bar-wrap left"><div class="stat-val left">${fmt(hv)}</div><div class="stat-bar"><div class="stat-bar-fill home" style="width:${hpct}%;float:right"></div></div></div>
      <div class="stat-name">${name}</div>
      <div class="stat-bar-wrap"><div class="stat-bar"><div class="stat-bar-fill away" style="width:${apct}%"></div></div><div class="stat-val right">${fmt(av)}</div></div>
    </div>`;
  };
  const f1=v=>v.toFixed(2), pct=v=>Math.round(v*100)+'%';
  const formPills=arr=>arr.map(r=>`<span class="form-pill ${r}">${r}</span>`).join('')||'<span style="color:var(--text3);font-size:11px">無</span>';
  const attackDefense=`<div class="data-section"><div class="data-section-title">📊 攻守對比（近${hs.n}/${as.n}場）</div><div class="stat-compare">
    ${statRow('場均進球',hs.avgGf,as.avgGf,f1)}
    ${statRow('場均失球',hs.avgGa,as.avgGa,f1)}
    ${statRow('零失球率',hs.csRate,as.csRate,pct)}
    <div class="stat-row"><div class="stat-bar-wrap left"><div class="form-pills" style="flex-direction:row-reverse">${formPills(hs.form)}</div></div><div class="stat-name">近況</div><div class="stat-bar-wrap"><div class="form-pills">${formPills(as.form)}</div></div></div>
  </div></div>`;

  const h2hSection=`<div class="data-section"><div class="data-section-title">⚔️ 歷史交手</div>${h2hFin.length?`<div class="h2h-list">${h2hFin.map(f=>{
    const d=new Date(f.fixture.date).toLocaleDateString('zh-TW',{year:'numeric',month:'numeric'});
    return`<div class="h2h-item"><div class="h2h-team r">${tw(f.teams.home.name)}</div><div><div class="h2h-score">${f.goals.home} - ${f.goals.away}</div><div class="h2h-date">${d}</div></div><div class="h2h-team">${tw(f.teams.away.name)}</div></div>`;
  }).join('')}</div>`:'<div class="data-note">查無兩隊歷史交手紀錄</div>'}</div>`;

  const pRow=p=>{const wr=Math.round(p.winRate*100);const cls=wr>=60?'hi':wr>=40?'mid':'lo';
    return`<div class="player-row"><div class="player-name">${p.name}</div><div class="player-stat"><span>${p.apps}場</span><span class="player-wr ${cls}">勝${wr}%</span><span>進${p.avgGf.toFixed(1)}</span></div></div>`;};
  let accId=0;
  const playerCol=(title,pat)=>{
    if(!pat.players.length)return `<div><div class="player-col-title">${tw(title)}</div><div class="data-note">${pat.withLineup<2?'出場名單資料不足':'無常規先發資料'}</div></div>`;
    const top=pat.players.slice(0,3), rest=pat.players.slice(3);
    const id='acc'+(accId++);
    const restHTML=rest.length?`<div class="acc-body" id="${id}">${rest.map(pRow).join('')}</div><button class="acc-btn" onclick="toggleAcc('${id}',this)">展開更多臨場陣容 (${rest.length}) ▾</button>`:'';
    return `<div><div class="player-col-title">${tw(title)}</div>${top.map(pRow).join('')}${restHTML}</div>`;
  };
  const playerSection=`<div class="data-section"><div class="data-section-title">👥 關鍵先發 × 戰績關聯</div><div class="player-cols">${playerCol(m.home,hp)}${playerCol(m.away,ap)}</div><div class="data-note">勝率＝該球員先發時球隊勝場占比；進＝該球員先發時球隊場均進球</div></div>`;

  return attackDefense+h2hSection+playerSection;
}

function showStatus(type,msg){
  const el=document.getElementById('status-bar');
  if(type==='ok')el.innerHTML=`<div class="status-ok">${msg}</div>`;
  else if(type==='warn')el.innerHTML=`<div class="status-warn">⚠️ ${msg}</div>`;
  else el.innerHTML=`<div style="margin-top:10px;color:var(--text2);font-size:12px;text-align:center">${msg}</div>`;
}
